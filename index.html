<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milán AI - Fix v1</title>
    <style>
        :root { --accent: #6366f1; --bg: #020617; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .orb { width: 150px; height: 150px; border-radius: 50%; background: radial-gradient(circle, var(--accent) 0%, #000 80%); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 70px; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 0 40px rgba(99, 102, 241, 0.3); border: 2px solid rgba(255,255,255,0.1); user-select: none; }
        .listening { transform: scale(1.1); box-shadow: 0 0 60px var(--accent); animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        #res-box { margin-top: 30px; padding: 25px; width: 85%; max-width: 600px; background: rgba(255,255,255,0.03); border-radius: 20px; text-align: center; font-size: 1.2rem; min-height: 80px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        #status { margin-top: 15px; color: #6366f1; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="orb" id="orb">M</div>
    <div id="status">KATTINTS ÉS BESZÉLJ</div>
    <div id="res-box">Szia Milán! Frissítettem az útvonalat. Próbáljuk meg most!</div>

    <script>
        // FONTOS: Ide az ÚJ kulcsodat másold be!
        const API_KEY = "AIzaSyAv0jN_Jc4VySM3Hv3Kkg2xeI3nFTZkKKI"; 
        
        const orb = document.getElementById('orb');
        const resBox = document.getElementById('res-box');
        const statusTxt = document.getElementById('status');
        
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'hu-HU';

        orb.onclick = () => {
            try {
                recognition.start();
                orb.classList.add('listening');
                statusTxt.innerText = "HALLGATLAK...";
            } catch(e) { console.log("Újraindítás..."); }
        };

        recognition.onresult = async (event) => {
            const speech = event.results[0][0].transcript;
            orb.classList.remove('listening');
            resBox.innerText = "Gondolkodom...";

            // STABIL v1 API hívás
            const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
            
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "Válaszolj magyarul, nagyon röviden: " + speech }] }]
                    })
                });

                const data = await response.json();

                if (data.error) {
                    resBox.innerText = "Hiba: " + data.error.message;
                    console.error("DEBUG:", data.error);
                } else if (data.candidates && data.candidates[0].content) {
                    const reply = data.candidates[0].content.parts[0].text;
                    speak(reply);
                } else {
                    resBox.innerText = "A Google nem küldött választ. Próbáld újra!";
                }
            } catch (e) {
                resBox.innerText = "Hálózati hiba történt.";
            }
        };

        function speak(t) {
            resBox.innerText = t;
            const u = new SpeechSynthesisUtterance(t);
            u.lang = 'hu-HU';
            window.speechSynthesis.speak(u);
            statusTxt.innerText = "KATTINTS ÉS BESZÉLJ";
        }
    </script>
</body>
</html>
