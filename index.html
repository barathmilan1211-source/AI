<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milán AI - Spotify AutoPlay</title>
    <style>
        body { background: #09090b; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .milan-ball { width: 160px; height: 160px; border-radius: 50%; background: radial-gradient(circle, #1db954, #121212); display: flex; align-items: center; justify-content: center; font-size: 70px; cursor: pointer; box-shadow: 0 0 40px rgba(29, 185, 84, 0.3); transition: 0.5s; user-select: none; border: 4px solid #1db954; }
        .active { transform: scale(1.1); box-shadow: 0 0 70px #1db954; background: #1db954; animation: pulse 1.2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        #status { margin-top: 25px; font-size: 1.1rem; color: #a1a1aa; text-transform: uppercase; letter-spacing: 2px; }
        #chat { margin-top: 15px; color: #1db954; font-weight: bold; text-align: center; max-width: 80%; font-size: 1.4rem; min-height: 50px; text-shadow: 0 0 10px rgba(29, 185, 84, 0.5); }
    </style>
</head>
<body>

    <div class="milan-ball" id="ball">M</div>
    <p id="status">Kattints a gombra!</p>
    <div id="chat"></div>

    <script>
        // --- A TE ADATAID ---
        const API_KEY = "37fb0c375bfc4db18eea3d9148f7200e";
        const DEVICE_ID = "52f9bb814cc24dba8457407666fd1464";

        const ball = document.getElementById('ball');
        const status = document.getElementById('status');
        const chat = document.getElementById('chat');

        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'hu-HU';
        recognition.continuous = true;

        ball.onclick = () => {
            try {
                recognition.start();
                status.innerText = "Hallgatlak, Milán!";
                ball.innerText = "🎤";
            } catch(e) {}
        };

        recognition.onresult = (event) => {
            const result = event.results[event.results.length - 1][0].transcript.toLowerCase();
            if (result.includes("milán") || result.includes("milan")) {
                const command = result.replace(/milán|milan/g, "").trim();
                processCommand(command);
            }
        };

        function processCommand(cmd) {
            if (cmd.includes("játszd le a") || cmd.includes("indítsd el a")) {
                const song = cmd.replace(/játszd le a|indítsd el a/g, "").trim();
                if (song.length > 0) {
                    playOnSpotify(song);
                }
            } else if (cmd.includes("hogy vagy")) {
                speak("Szuperül vagyok! Mit hallgatunk?");
            } else {
                speak("Figyelek!");
            }
        }

        async function playOnSpotify(songName) {
            status.innerText = "Zene indítása...";
            
            // 1. Megnyitjuk a Spotify-t a kereséssel
            const spotifyUri = `spotify:search:${encodeURIComponent(songName)}`;
            
            // 2. Küldünk egy Tasker/Join parancsot, ami azt mondja az Androidnak: "Lejátszás"
            // Ehhez a 'find' és 'app' paramétereket használjuk, hogy kényszerítsük az indítást
            const finalApiUrl = `https://joinjoaomgcd.appspot.com/_ah/api/messaging/v1/sendPush?url=${encodeURIComponent(spotifyUri)}&text=${encodeURIComponent("play " + songName)}&app=Spotify&deviceId=${DEVICE_ID}&apikey=${API_KEY}`;

            try {
                await fetch(finalApiUrl, { mode: 'no-cors' });
                speak("Azonnal indítom a " + songName + " dalt a Spotify-on!");
            } catch (e) {
                speak("Hiba történt az S8-as elérésekor.");
            }
        }

        function speak(text) {
            chat.innerText = text;
            const synth = window.speechSynthesis;
            const utter = new SpeechSynthesisUtterance(text);
            utterance.lang = 'hu-HU';
            ball.classList.add('active');
            utter.onend = () => ball.classList.remove('active');
            synth.speak(utter);
        }

        recognition.onend = () => { try { recognition.start(); } catch(e) {} };
    </script>
</body>
</html>
