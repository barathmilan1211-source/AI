<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milán AI - Diagnózis</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .orb { width: 100px; height: 100px; background: #0f0; border-radius: 50%; cursor: pointer; box-shadow: 0 0 20px #0f0; }
        #log { margin-top: 20px; background: #111; padding: 15px; width: 90%; max-height: 200px; overflow-y: auto; font-size: 12px; border: 1px solid #333; }
    </style>
</head>
<body>

    <div class="orb" id="orb"></div>
    <p>Kattints a gombra és beszélj!</p>
    <div id="log">Rendszerüzenetek itt...</div>

    <script>
        const GEMINI_API_KEY = "AIzaSyD3_jjMR5S4n8UVV45fD9EgfUA33vesepA";
        const log = document.getElementById('log');

        function addLog(msg) { log.innerHTML += "<br>> " + msg; log.scrollTop = log.scrollHeight; }

        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'hu-HU';

        document.getElementById('orb').onclick = () => { recognition.start(); addLog("Hallgatlak..."); };

        recognition.onresult = async (event) => {
            const text = event.results[0][0].transcript;
            addLog("Mondtad: " + text);
            
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`;
            
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
                });

                const data = await response.json();
                
                if (data.error) {
                    addLog("HIBA ÜZENET: " + data.error.message);
                    addLog("HIBA KÓD: " + data.error.status);
                } else if (data.candidates && data.candidates[0].content) {
                    const reply = data.candidates[0].content.parts[0].text;
                    addLog("AI VÁLASZ: " + reply);
                    speak(reply);
                } else {
                    addLog("VÁRATLAN VÁLASZ: " + JSON.stringify(data));
                }
            } catch (e) {
                addLog("FETCH HIBA: " + e.message);
            }
        };

        function speak(t) {
            const u = new SpeechSynthesisUtterance(t);
            u.lang = 'hu-HU';
            window.speechSynthesis.speak(u);
        }
    </script>
</body>
</html>
