<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milán Intelligent Assistant</title>
    <style>
        body { background: #020617; color: #f8fafc; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        
        /* Pulzáló AI mag */
        .ai-core {
            width: 140px; height: 140px; border-radius: 50%;
            background: conic-gradient(#1db954, #38bdf8, #1db954);
            display: flex; align-items: center; justify-content: center;
            font-size: 60px; cursor: pointer; position: relative;
            transition: 0.5s; box-shadow: 0 0 30px rgba(56, 189, 248, 0.2);
        }
        
        .thinking { animation: rotate 2s linear infinite; box-shadow: 0 0 60px #38bdf8; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        #response-text {
            margin-top: 30px; padding: 20px; border-radius: 15px;
            background: rgba(255,255,255,0.05); width: 80%;
            min-height: 80px; text-align: center; font-size: 1.2rem;
            border-left: 4px solid #38bdf8;
        }
    </style>
</head>
<body>

    <div class="ai-core" id="aiBtn">M</div>
    <div id="status">Koppints a beszédhez</div>
    <div id="response-text">Szia Milán! Én egy valódi AI vagyok. Kérdezz tőlem bármit, vagy kérj zenét!</div>

    <script>
        // --- KONFIGURÁCIÓ ---
        const JOIN_API_KEY = "37fb0c375bfc4db18eea3d9148f7200e";
        const JOIN_DEVICE_ID = "52f9bb814cc24dba8457407666fd1464";
        // Ide illesztheted majd a Gemini vagy más AI kulcsodat
        const AI_API_URL = "https://api-inference.huggingface.co/models/facebook/blenderbot-400M-distill"; 

        const aiBtn = document.getElementById('aiBtn');
        const respDisplay = document.getElementById('response-text');
        
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'hu-HU';

        aiBtn.onclick = () => {
            recognition.start();
            aiBtn.classList.add('thinking');
            document.getElementById('status').innerText = "Hallgatom a kérdésed...";
        };

        recognition.onresult = async (event) => {
            const userSpeech = event.results[0][0].transcript;
            respDisplay.innerText = "Gondolkodom...";
            
            // 1. Megnézzük, zenét akar-e (Helyi logika)
            if (userSpeech.toLowerCase().includes("játszd le") || userSpeech.toLowerCase().includes("indítsd el")) {
                const song = userSpeech.toLowerCase().replace(/játszd le a|indítsd el a|milán/g, "").trim();
                playSpotify(song);
                return;
            }

            // 2. Ha nem zene, küldjük az AI-nak (API hívás)
            const aiAnswer = await askTheAI(userSpeech);
            speak(aiAnswer);
        };

        // --- AZ AI AGYA (API HÍVÁS) ---
        async function askTheAI(question) {
            try {
                // Itt egy ingyenes AI modellt hívunk meg (példa)
                // Milán, ide jönne a valódi API kulcsos hívásod
                return "Szia Milán! Azt kérdezted, hogy: " + question + ". Ez egy izgalmas kérdés, de még be kell kötnöd a Gemini API kulcsodat, hogy pontosan válaszolhassak!";
            } catch (e) {
                return "Hiba történt az AI agyam elérésekor.";
            }
        }

        async function playSpotify(song) {
            const spotifyUri = `spotify:search:${encodeURIComponent(song)}`;
            const url = `https://joinjoaomgcd.appspot.com/_ah/api/messaging/v1/sendPush?url=${encodeURIComponent(spotifyUri)}&text=${encodeURIComponent("play " + song)}&app=Spotify&deviceId=${JOIN_DEVICE_ID}&apikey=${JOIN_API_KEY}`;
            await fetch(url, { mode: 'no-cors' });
            speak("Rendben Milán, indítom a Spotify-on a következőt: " + song);
        }

        function speak(text) {
            respDisplay.innerText = text;
            aiBtn.classList.remove('thinking');
            const synth = window.speechSynthesis;
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'hu-HU';
            synth.speak(utter);
        }
    </script>
</body>
</html>
