<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Milán AI - Fix 404</title>
    <style>
        body { background: #020617; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .orb { width: 140px; height: 140px; border-radius: 50%; background: radial-gradient(circle, #6366f1 0%, #000 80%); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 60px; box-shadow: 0 0 30px rgba(99, 102, 241, 0.4); border: 2px solid rgba(255,255,255,0.1); }
        #res { margin-top: 30px; padding: 20px; width: 85%; max-width: 600px; background: rgba(255,255,255,0.05); border-radius: 15px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <div class="orb" id="orb">M</div>
    <div id="status" style="margin-top:10px; color:#4b5563;">KATTINTS A BESZÉDHEZ</div>
    <div id="res">Most már nem lesz 404-es hiba!</div>

    <script>
        // HASZNÁLD AZ ÚJ KULCSODAT!
        const API_KEY = "AIzaSyAv0jN_Jc4VySM3Hv3Kkg2xeI3nFTZkKKI"; 

        const orb = document.getElementById('orb');
        const resBox = document.getElementById('res');
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'hu-HU';

        orb.onclick = () => { recognition.start(); document.getElementById('status').innerText = "HALLGATLAK..."; };

        recognition.onresult = async (event) => {
            const text = event.results[0][0].transcript;
            resBox.innerText = "Gondolkodom...";
            
            // A JAVÍTOTT URL (v1beta-t használunk, mert a Flash ott a legstabilabb jelenleg)
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
            
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        contents: [{ parts: [{ text: "Válaszolj magyarul, röviden: " + text }] }] 
                    })
                });

                const data = await response.json();
                
                if (data.error) {
                    // Ha még mindig hiba van, kiírjuk a pontos okot
                    resBox.innerText = "Google Hiba: " + data.error.message;
                    console.error("Részletek:", data.error);
                } else if (data.candidates && data.candidates[0].content) {
                    const reply = data.candidates[0].content.parts[0].text;
                    resBox.innerText = reply;
                    const u = new SpeechSynthesisUtterance(reply);
                    u.lang = 'hu-HU';
                    window.speechSynthesis.speak(u);
                }
            } catch (e) { 
                resBox.innerText = "Kapcsolódási hiba történt."; 
            }
            document.getElementById('status').innerText = "KATTINTS ÉS BESZÉLJ";
        };
    </script>
</body>
</html>
