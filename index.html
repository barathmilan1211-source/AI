<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milán AI - Mistral Motor</title>
    <style>
        :root { --accent: #10b981; --bg: #020617; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        
        .milan-orb { 
            width: 150px; height: 150px; border-radius: 50%; 
            background: radial-gradient(circle, var(--accent) 0%, #000 85%); 
            display: flex; align-items: center; justify-content: center; 
            font-size: 80px; cursor: pointer; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            box-shadow: 0 0 40px rgba(16, 185, 129, 0.2); 
            border: 2px solid rgba(255,255,255,0.1);
            user-select: none;
        }

        .listening { transform: scale(1.1); box-shadow: 0 0 60px var(--accent); animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        #res-box { 
            margin-top: 30px; padding: 25px; width: 85%; max-width: 600px; 
            background: rgba(255,255,255,0.05); border-radius: 20px; 
            text-align: center; font-size: 1.2rem; min-height: 80px; 
            border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px);
        }
        
        #status { margin-top: 15px; color: #10b981; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="milan-orb" id="orb">M</div>
    <div id="status">KATTINTS ÉS BESZÉLJ</div>
    <div id="res-box">Szia Milán! A Hugging Face motor beizzítva. Mondj valamit!</div>

    <script>
        // A Te Hugging Face Tokened
        const HF_TOKEN = "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"; 
        
        const orb = document.getElementById('orb');
        const resBox = document.getElementById('res-box');
        const statusTxt = document.getElementById('status');
        
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'hu-HU';

        orb.onclick = () => {
            try {
                recognition.start();
                orb.classList.add('listening');
                statusTxt.innerText = "HALLGATLAK...";
            } catch(e) { console.log("Már hallgat..."); }
        };

        recognition.onresult = async (event) => {
            const userSpeech = event.results[0][0].transcript;
            orb.classList.remove('listening');
            resBox.innerText = "Gondolkodom...";

            try {
                // A Mistral-7B modellt hívjuk, ami nagyon jó magyarul
                const response = await fetch("https://api-inference.huggingface.co/models/mistralai/Mistral-7B-Instruct-v0.2", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${HF_TOKEN}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        inputs: `[INST] Te egy kedves magyar asszisztens vagy. Válaszolj Milánnak röviden: ${userSpeech} [/INST]`,
                        parameters: { max_new_tokens: 150, return_full_text: false }
                    })
                });

                const data = await response.json();
                
                // Válasz kinyerése
                let reply = "";
                if (Array.isArray(data) && data[0].generated_text) {
                    reply = data[0].generated_text.trim();
                } else if (data.error) {
                    reply = "Az AI éppen ébredezik, próbáld meg 10 másodperc múlva!";
                }

                speak(reply);

            } catch (e) {
                resBox.innerText = "Hiba történt a kapcsolódáskor.";
                console.error(e);
            }
            statusTxt.innerText = "KATTINTS ÉS BESZÉLJ";
        };

        function speak(text) {
            resBox.innerText = text;
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'hu-HU';
            window.speechSynthesis.speak(utter);
        }
    </script>
</body>
</html>
