<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milán AI - Spotify Control</title>
    <style>
        body { background: #0f172a; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .milan-ball { width: 170px; height: 170px; border-radius: 50%; background: linear-gradient(135deg, #1DB954 0%, #191414 100%); display: flex; align-items: center; justify-content: center; font-size: 70px; cursor: pointer; box-shadow: 0 0 30px rgba(29, 185, 84, 0.4); transition: 0.4s; user-select: none; }
        .active { transform: scale(1.1); box-shadow: 0 0 60px #1DB954; background: #1DB954; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1.1); } 50% { transform: scale(1.15); } 100% { transform: scale(1.1); } }
        #status { margin-top: 30px; font-size: 1.2rem; color: #94a3b8; text-align: center; }
        #chat { margin-top: 20px; color: #1DB954; font-style: italic; text-align: center; max-width: 85%; font-size: 1.3rem; min-height: 60px; }
    </style>
</head>
<body>

    <div class="milan-ball" id="ball">M</div>
    <p id="status">Kattints az M-re!</p>
    <div id="chat"></div>

    <script>
        // --- JOIN API ADATOK ---
        const JOIN_API_KEY = "37fb0c375bfc4db18eea3d9148f7200e";
        const JOIN_DEVICE_ID = "group.all"; 

        const ball = document.getElementById('ball');
        const status = document.getElementById('status');
        const chat = document.getElementById('chat');

        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'hu-HU';
        recognition.continuous = true;

        ball.onclick = () => {
            try {
                recognition.start();
                status.innerText = "Mondd a zenét, Milán!";
                ball.innerText = "🎧";
            } catch(e) {}
        };

        recognition.onresult = (event) => {
            const text = event.results[event.results.length - 1][0].transcript.toLowerCase();
            if (text.includes("milán") || text.includes("milan")) {
                const parancs = text.replace(/milán|milan/g, "").trim();
                feldolgozas(parancs);
            }
        };

        function feldolgozas(mondat) {
            if (mondat.includes("játszd le a") || mondat.includes("indítsd el a")) {
                const zene = mondat.replace(/játszd le a|indítsd el a/g, "").trim();
                if (zene.length > 1) {
                    inditsdSpotify(zene);
                }
            } else {
                beszelj("Itt vagyok, Spotify készenlétben!");
            }
        }

        async function inditsdSpotify(zeneCim) {
            status.innerText = "Spotify parancs küldése...";
            
            // Ez a Spotify speciális kereső linkje (Deep Link)
            const spotifyLink = `spotify:search:${encodeURIComponent(zeneCim)}`;
            
            // Join API hívás
            const apiUrl = `https://joinjoaomgcd.appspot.com/_ah/api/messaging/v1/sendPush?url=${encodeURIComponent(spotifyLink)}&text=${encodeURIComponent("Spotify indítása: " + zeneCim)}&deviceId=${JOIN_DEVICE_ID}&apikey=${JOIN_API_KEY}`;

            try {
                await fetch(apiUrl, { mode: 'no-cors' }); 
                beszelj("Rendben! Indítom a " + zeneCim + " dalt a Spotify-on.");
            } catch (e) {
                beszelj("Hiba történt a küldés közben.");
            }
        }

        function beszelj(szoveg) {
            chat.innerText = szoveg;
            const synth = window.speechSynthesis;
            const utterance = new SpeechSynthesisUtterance(szoveg);
            utterance.lang = 'hu-HU';
            ball.classList.add('active');
            utterance.onend = () => ball.classList.remove('active');
            synth.speak(utterance);
        }

        recognition.onend = () => { try { recognition.start(); } catch(e) {} };
    </script>
</body>
</html>
