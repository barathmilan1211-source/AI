<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Milán AI - Smart Home</title>
    <style>
        body { background: #0f172a; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .milan-ball { width: 180px; height: 180px; border-radius: 50%; background: radial-gradient(circle, #0ea5e9, #0284c7); display: flex; align-items: center; justify-content: center; font-size: 80px; cursor: pointer; box-shadow: 0 0 30px #0ea5e9; transition: 0.4s; }
        .active { transform: scale(1.1); box-shadow: 0 0 60px #22c55e; background: #22c55e; } /* Zöld fény, ha vezérel valamit */
        #status { margin-top: 30px; font-size: 1.3rem; color: #94a3b8; }
        #chat { margin-top: 20px; color: #38bdf8; font-style: italic; text-align: center; max-width: 80%; font-size: 1.5rem; }
    </style>
</head>
<body>

    <div class="milan-ball" id="ball">M</div>
    <p id="status">Kattints az M-re!</p>
    <div id="chat"></div>

    <script>
        // IDE KELL MAJD AZ EVELINK / IFTTT WEBHOOK LINKJE
        const EVELINK_BE_URL = "https://maker.ifttt.com/trigger/lampa_be/with/key/SAJAT_KULCSOD";
        const EVELINK_KI_URL = "https://maker.ifttt.com/trigger/lampa_ki/with/key/SAJAT_KULCSOD";

        const ball = document.getElementById('ball');
        const status = document.getElementById('status');
        const chat = document.getElementById('chat');

        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'hu-HU';
        recognition.continuous = true;

        ball.onclick = () => {
            recognition.start();
            status.innerText = "Parancsolj, Milán!";
        };

        recognition.onresult = (event) => {
            const text = event.results[event.results.length - 1][0].transcript.toLowerCase();
            console.log("Parancs:", text);

            if (text.includes("milán") || text.includes("milan")) {
                const command = text.replace(/milán|milan/g, "").trim();
                okosOtthonVezerles(command);
            }
        };

        async function okosOtthonVezerles(parancs) {
            let valasz = "Ezt a parancsot nem ismerem.";

            // LÁMPA BEKAPCSOLÁSA
            if (parancs.includes("kapcsold be a lámpát") || parancs.includes("lámpát be")) {
                valasz = "Értettem, Milán! Kapcsolom a lámpát.";
                beszelj(valasz);
                await fetch(EVELINK_BE_URL, { mode: 'no-cors' }); // Jel küldése az Evelinknek
            } 
            // LÁMPA KIKAPCSOLÁSA
            else if (parancs.includes("kapcsold ki a lámpát") || parancs.includes("lámpát ki")) {
                valasz = "Rendben, lekapcsolom a világítást.";
                beszelj(valasz);
                await fetch(EVELINK_KI_URL, { mode: 'no-cors' });
            }
            // EGYÉB KÉRDÉSEK (Idő, Vicc, stb.)
            else {
                if (parancs.includes("idő")) valasz = "A pontos idő: " + new Date().toLocaleTimeString('hu-HU');
                else if (parancs.includes("vicc")) valasz = "Miért nézi a programozó a tejesdobozt? Mert rá van írva, hogy nyitható.";
                else valasz = "Itt vagyok, hallgatlak!";
                beszelj(valasz);
            }
        }

        function beszelj(szoveg) {
            chat.innerText = szoveg;
            const synth = window.speechSynthesis;
            const utterance = new SpeechSynthesisUtterance(szoveg);
            utterance.lang = 'hu-HU';
            ball.classList.add('active');
            utterance.onend = () => ball.classList.remove('active');
            synth.speak(utterance);
        }

        recognition.onend = () => recognition.start();
    </script>
</body>
</html>
